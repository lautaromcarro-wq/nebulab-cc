name: Supabase types drift

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "src/integrations/supabase/types.ts"
      - ".github/workflows/supabase-types-check.yml"

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Regenerate types from migrations
        run: supabase gen types typescript --local > /tmp/types.generated.ts

      - name: Diff against committed types
        run: |
          if ! diff -u src/integrations/supabase/types.ts /tmp/types.generated.ts; then
            echo ""
            echo "::error::src/integrations/supabase/types.ts is out of sync with migrations."
            echo "Run: supabase gen types typescript --local > src/integrations/supabase/types.ts"
            exit 1
          fi
          echo "types.ts matches migrations ✔"

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
